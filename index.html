<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Zwierzęta</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Galeria Zwierząt</h1>

    <div class="gallery">

        <div class="card">
            <img src="obrazek1.jpg" alt="Ptak">
            <h2>Zimorodek</h2>
        </div>

        <div class="card">
            <img src="obrazek2.jfif" alt="Kot">
            <h2>Pies</h2>
        </div>

        <div class="card">
            <img src="obrazek3.jpg" alt="Pies">
            <h2>Kotek</h2>
        </div>

    </div>

</body>
</html>
